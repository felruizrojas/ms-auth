services:

  # ── Base de datos exclusiva de ms-auth ───────────────────────────────────────

  db-ms-auth:
    container_name: ms-auth-db
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ms_auth
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ms_auth"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ms_auth_net
    restart: unless-stopped

  # ── Redis (cola de eventos hacia ms-users) ───────────────────────────────────

  redis:
    container_name: ms-auth-redis
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - ms_auth_net
    restart: unless-stopped

  # ── ms-auth ──────────────────────────────────────────────────────────────────

  ms-auth:
    container_name: ms-auth
    image: ms-auth
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3001
      # PostgreSQL
      DB_HOST: db-ms-auth
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: ms_auth
      # Redis / Bull
      REDIS_URL: redis://redis:6379
      # JWT
      JWT_SECRET: 6dcc110adf4dcde1015a418452ec8ca39780835ef83d28b13b165799a0525f264594d585080db90d09b8b9d4661507e40d67d5d2ae7673fb0b92719a18233213
      # Comunicación interna
      INTERNAL_API_KEY: fe7db533c3030b5da6e544f4c631f92cbcdf0f0d452962e3cbfe08ca5a8c116e
      # Gmail (OTP / reset de contraseña)
      GMAIL_USER: felandresr@gmail.com
      GMAIL_APP_PASSWORD: polabayuyxzzbyyc
    ports:
      - "3001:3001"
    depends_on:
      db-ms-auth:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ms_auth_net
    restart: unless-stopped

# ── Volúmenes y red ──────────────────────────────────────────────────────────

volumes:
  db_data:
  redis_data:

networks:
  ms_auth_net:
    driver: bridge
